name: Admin CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'clients/admin/**'
  #     - '.github/workflows/admin-ci.yml'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'clients/admin/**'
  #     - '.github/workflows/admin-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
