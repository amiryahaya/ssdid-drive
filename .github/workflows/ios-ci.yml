name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/ios/**'
      - '.github/workflows/ios-ci.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: clients/ios/SsdidDrive

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -scheme SsdidDrive -clonedSourcePackagesDirPath .spm-cache

      - name: Build (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme SsdidDrive \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath .spm-cache \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Unit Tests
        run: |
          xcodebuild test \
            -scheme SsdidDrive \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -clonedSourcePackagesDirPath .spm-cache \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: clients/ios/SsdidDrive/TestResults.xcresult
          retention-days: 14
