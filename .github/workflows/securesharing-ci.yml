name: SecureSharing Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/securesharing/**'
      - '.github/workflows/securesharing-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/securesharing/**'
      - '.github/workflows/securesharing-ci.yml'
  workflow_dispatch:
    inputs:
      skip_integration:
        description: 'Skip integration tests'
        required: false
        default: false
        type: boolean

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.18.4'
  OTP_VERSION: '27.3'

defaults:
  run:
    working-directory: services/securesharing

jobs:
  # ============================================================================
  # Lint & Format Check
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run Credo
        run: mix credo --min-priority=high
        continue-on-error: true

  # ============================================================================
  # Static Analysis (Dialyzer)
  # ============================================================================
  dialyzer:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: services/securesharing/priv/plts
          key: ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Create PLTs directory
        run: mkdir -p priv/plts

      - name: Run Dialyzer
        run: mix dialyzer --format github
        continue-on-error: true

  # ============================================================================
  # Unit Tests (With Database - app requires Repo to start)
  # ============================================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: securesharing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Setup database
        run: mix ecto.setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

      - name: Run unit tests
        run: mix test --exclude integration --exclude e2e --exclude s3
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

  # ============================================================================
  # Integration Tests (With Database)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_integration }}
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: securesharing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Setup database
        run: mix ecto.setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

      - name: Run all tests
        run: mix test --exclude s3 --exclude e2e
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

  # ============================================================================
  # Code Coverage
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: securesharing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Setup database
        run: mix ecto.setup
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

      - name: Run coverage
        run: mix coveralls.json --exclude s3 --exclude e2e
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/securesharing_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: services/securesharing/cover/excoveralls.json
          flags: securesharing
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Docker Build Check
  # ============================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No Dockerfile found in services/securesharing - skipping Docker build"
          fi

      - name: Build Docker image
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: services/securesharing
          push: false
          tags: securesharing:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Security Scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            services/securesharing/deps
            services/securesharing/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('services/securesharing/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check for retired dependencies
        run: mix hex.audit
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'services/securesharing'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  # ============================================================================
  # Summary
  # ============================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, docker-build]
    if: always()
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.integration-tests.result }}" != "success" && "${{ needs.integration-tests.result }}" != "skipped" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required CI checks passed!"
