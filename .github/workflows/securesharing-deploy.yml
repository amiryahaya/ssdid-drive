name: SecureSharing Backend Deploy

# =============================================================================
# DEPLOYMENT WORKFLOW
# =============================================================================
# - Staging: Triggered on push to main (services/securesharing/** changes)
# - Production: Triggered by tag push (securesharing-v*) or manual dispatch
# - Manual: Via workflow_dispatch with environment selector
#
# Required GitHub secrets (per environment):
#   STAGING_SSH_HOST, STAGING_SSH_USER, STAGING_SSH_KEY
#   PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_KEY
#   DATABASE_URL, SECRET_KEY_BASE, GARAGE_ACCESS_KEY, GARAGE_SECRET_KEY
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'services/securesharing/**'
      - '.github/workflows/securesharing-deploy.yml'
    tags:
      - 'securesharing-v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version tag (optional, uses SHA if empty)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/securesharing

defaults:
  run:
    working-directory: services/securesharing

jobs:
  # ============================================================================
  # Run CI First
  # ============================================================================
  ci:
    name: Run CI
    uses: ./.github/workflows/securesharing-ci.yml
    secrets: inherit

  # ============================================================================
  # Build & Push Docker Image
  # ============================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for Dockerfile
        id: check-dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "dockerfile_exists=true" >> $GITHUB_OUTPUT
          else
            echo "dockerfile_exists=false" >> $GITHUB_OUTPUT
            echo "::warning::No Dockerfile found - skipping Docker build and push"
          fi

      - name: Set up QEMU
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}},prefix=v
            type=semver,pattern={{major}}.{{minor}},prefix=v
            type=sha,prefix=sha-
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: services/securesharing
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Generate SBOM
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true' && steps.build.outputs.digest != ''
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          artifact-name: sbom-securesharing.spdx.json
          output-file: ./sbom-securesharing.spdx.json

      - name: Upload SBOM
        if: steps.check-dockerfile.outputs.dockerfile_exists == 'true' && steps.build.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom-securesharing
          path: services/securesharing/sbom-securesharing.spdx.json

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    # Enable when staging is provisioned by removing 'false &&'
    if: false && (github.ref == 'refs/heads/main' || inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    concurrency:
      group: deploy-securesharing-staging
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_SSH_HOST }} >> ~/.ssh/known_hosts
        working-directory: .

      - name: Pull latest Docker image on staging
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            echo "=== Pulling latest image ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Tagging previous image as rollback ==="
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rollback 2>/dev/null || true

            echo "=== Running database migrations ==="
            docker run --rm --env-file /opt/securesharing/.env \
              --network host \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              bin/secure_sharing eval "SecureSharing.Release.migrate()"

            echo "=== Restarting service ==="
            cd /opt/securesharing
            docker compose pull
            docker compose up -d --remove-orphans

            echo "=== Cleanup old images ==="
            docker image prune -f
          DEPLOY_SCRIPT
        working-directory: .

      - name: Health check
        run: |
          echo "Waiting for service to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf "${{ vars.STAGING_URL }}/health/ready" > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 30 attempts"
          exit 1
        working-directory: .

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Verify key endpoints respond correctly
          curl -sf "${{ vars.STAGING_URL }}/health/ready" | jq .
          curl -sf "${{ vars.STAGING_URL }}/health/detailed" | jq .
        working-directory: .

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Deployment failed - attempting rollback"
          ssh -i ~/.ssh/deploy_key ${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }} << 'ROLLBACK'
            set -e
            cd /opt/securesharing
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rollback \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || exit 0
            docker compose up -d --remove-orphans
            echo "Rollback complete"
          ROLLBACK
        working-directory: .

  # ============================================================================
  # Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    # Enable when production is provisioned by removing 'false &&'
    if: false && (startsWith(github.ref, 'refs/tags/securesharing-v') || inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    concurrency:
      group: deploy-securesharing-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts
        working-directory: .

      - name: Deploy to production
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          ssh -i ~/.ssh/deploy_key ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} << DEPLOY_SCRIPT
            set -e
            echo "=== Pulling image ${IMAGE_TAG} ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}

            echo "=== Tagging previous image as rollback ==="
            CURRENT=\$(docker inspect --format='{{.Image}}' securesharing 2>/dev/null || echo "")
            if [ -n "\$CURRENT" ]; then
              docker tag "\$CURRENT" ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rollback 2>/dev/null || true
            fi

            echo "=== Running database migrations ==="
            docker run --rm --env-file /opt/securesharing/.env \
              --network host \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
              bin/secure_sharing eval "SecureSharing.Release.migrate()"

            echo "=== Restarting service ==="
            cd /opt/securesharing
            docker compose pull
            docker compose up -d --remove-orphans

            echo "=== Cleanup old images ==="
            docker image prune -f
          DEPLOY_SCRIPT
        working-directory: .

      - name: Health check
        run: |
          echo "Waiting for production service to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf "${{ vars.PRODUCTION_URL }}/health/ready" > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 10s..."
            sleep 10
          done
          echo "::error::Production health check failed after 30 attempts"
          exit 1
        working-directory: .

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed - attempting rollback"
          ssh -i ~/.ssh/deploy_key ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} << 'ROLLBACK'
            set -e
            cd /opt/securesharing
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rollback \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest 2>/dev/null || exit 0
            docker compose up -d --remove-orphans
            echo "Rollback complete"
          ROLLBACK
        working-directory: .

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Version: ${{ needs.build.outputs.image_tag }}"
        working-directory: .

  # ============================================================================
  # Database Migration (Manual Trigger)
  # ============================================================================
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [build]
    if: false  # Run via workflow_dispatch when needed
    environment:
      name: ${{ inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
            SSH_HOST="${{ secrets.PROD_SSH_HOST }}"
            SSH_USER="${{ secrets.PROD_SSH_USER }}"
          else
            echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
            SSH_HOST="${{ secrets.STAGING_SSH_HOST }}"
            SSH_USER="${{ secrets.STAGING_SSH_USER }}"
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          echo "SSH_HOST=$SSH_HOST" >> $GITHUB_ENV
          echo "SSH_USER=$SSH_USER" >> $GITHUB_ENV
        working-directory: .

      - name: Run migrations
        run: |
          ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'MIGRATE'
            set -e
            docker run --rm --env-file /opt/securesharing/.env \
              --network host \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              bin/secure_sharing eval "SecureSharing.Release.migrate()"
            echo "Migrations complete"
          MIGRATE
        working-directory: .

  # ============================================================================
  # Create Release
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/securesharing-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: sbom-securesharing
        continue-on-error: true

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > CHANGELOG.md
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || echo "- Initial release" >> CHANGELOG.md
        working-directory: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: SecureSharing Backend ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            sbom-securesharing.spdx.json
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
