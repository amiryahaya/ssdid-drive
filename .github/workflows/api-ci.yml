name: API CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'src/SsdidDrive.Api/**'
  #     - 'tests/SsdidDrive.Api.Tests/**'
  #     - '.github/workflows/api-ci.yml'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'src/SsdidDrive.Api/**'
  #     - 'tests/SsdidDrive.Api.Tests/**'

env:
  KAZSIGN_VERSION: v2.0.2

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ssdid
          POSTGRES_PASSWORD: ssdid_test
          POSTGRES_DB: ssdid_drive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ssdid-sdk-dotnet
        uses: actions/checkout@v4
        with:
          repository: amiryahaya/ssdid-sdk-dotnet
          path: ../ssdid-sdk-dotnet
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download libkazsign (linux-x64)
        run: |
          mkdir -p src/SsdidDrive.Api/runtimes/linux-amd64/native
          gh release download ${{ env.KAZSIGN_VERSION }} \
            --repo amiryahaya/pqc-kaz \
            --pattern 'kaz-sign-linux-x64.tar.gz' \
            --dir /tmp
          tar xzf /tmp/kaz-sign-linux-x64.tar.gz -C src/SsdidDrive.Api/runtimes/linux-amd64/native
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: dotnet build tests/SsdidDrive.Api.Tests/ -c Release

      - name: Test
        run: dotnet run --project tests/SsdidDrive.Api.Tests/ -c Release --no-build
        env:
          ConnectionStrings__Default: "Host=localhost;Database=ssdid_drive_test;Username=ssdid;Password=ssdid_test"
          ConnectionStrings__Redis: "localhost:6379"
          LD_LIBRARY_PATH: ${{ github.workspace }}/src/SsdidDrive.Api/runtimes/linux-amd64/native
