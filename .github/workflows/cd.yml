name: CD

on:
  push:
    branches: [main]
    paths:
      - 'src/SsdidDrive.Api/**'
      - 'clients/admin/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api
  KAZSIGN_VERSION: v2.0.2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Checkout ssdid-sdk-dotnet
        uses: actions/checkout@v4
        with:
          repository: amiryahaya/ssdid-sdk-dotnet
          path: ../ssdid-sdk-dotnet
          token: ${{ secrets.GITHUB_TOKEN }}

      # Download libkazsign native library from PQC-KAZ release
      - name: Download libkazsign (linux-x64)
        run: |
          mkdir -p src/SsdidDrive.Api/runtimes/linux-amd64/native
          gh release download ${{ env.KAZSIGN_VERSION }} \
            --repo amiryahaya/pqc-kaz \
            --pattern 'kaz-sign-linux-x64.tar.gz' \
            --dir /tmp
          tar xzf /tmp/kaz-sign-linux-x64.tar.gz -C src/SsdidDrive.Api/runtimes/linux-amd64/native
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build admin SPA (output goes to src/SsdidDrive.Api/wwwroot/admin/)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/admin/package-lock.json

      - name: Build admin SPA
        run: |
          cd clients/admin
          npm ci
          npm run build

      # Build and push container image
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Copy SDK source into build context (Containerfile expects ssdid-sdk-dotnet-src/)
      - name: Prepare SDK source for container build
        run: cp -r ../ssdid-sdk-dotnet/src ssdid-sdk-dotnet-src

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SsdidDrive.Api/Containerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            TARGETARCH=amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
