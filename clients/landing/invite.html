<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Join SSDID Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <div class="text-center mb-6">
                <img src="/icon-192.png" alt="SSDID Drive" class="w-12 h-12 rounded-xl mb-4 mx-auto">
                <h1 class="text-xl font-bold text-gray-900">Join SSDID Drive</h1>
                <p class="text-sm text-gray-500 mt-1">You've been invited</p>
            </div>

            <!-- Loading state -->
            <div id="state-loading" class="flex flex-col items-center py-8">
                <div class="w-8 h-8 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-sm text-gray-500 mt-4">Loading invitation...</p>
            </div>

            <!-- Invitation details -->
            <div id="state-invite" class="hidden">
                <div class="bg-blue-50 rounded-lg p-4 mb-6">
                    <p class="text-sm text-gray-600">You've been invited to join</p>
                    <p id="tenant-name" class="text-lg font-semibold text-gray-900 mt-1"></p>
                    <p class="text-sm text-gray-500 mt-1">as <span id="invite-role" class="font-medium text-gray-700"></span></p>
                    <p id="invite-message" class="text-sm text-gray-600 mt-2 italic hidden"></p>
                </div>

                <div class="bg-gray-50 rounded-lg p-4 mb-6">
                    <p class="text-xs text-gray-500 mb-2">Your invite code</p>
                    <div class="flex items-center justify-between bg-white rounded-md border border-gray-200 px-3 py-2">
                        <code id="invite-code" class="text-lg font-mono font-bold text-gray-900 tracking-wider"></code>
                        <button onclick="copyCode()" class="text-sm text-blue-600 hover:text-blue-700 font-medium ml-3">Copy</button>
                    </div>
                </div>

                <p class="text-sm text-gray-600 text-center mb-4">
                    Open SSDID Drive and enter this code to join.
                </p>

                <div class="space-y-3">
                    <p class="text-xs text-gray-500 text-center">Don't have the app yet?</p>
                    <div class="grid grid-cols-3 gap-2">
                        <a href="#" class="bg-gray-100 rounded-lg p-3 text-center hover:bg-gray-200 transition">
                            <div class="text-xs font-medium text-gray-700">Desktop</div>
                        </a>
                        <a href="#" class="bg-gray-100 rounded-lg p-3 text-center hover:bg-gray-200 transition">
                            <div class="text-xs font-medium text-gray-700">Android</div>
                        </a>
                        <a href="#" class="bg-gray-100 rounded-lg p-3 text-center hover:bg-gray-200 transition">
                            <div class="text-xs font-medium text-gray-700">iOS</div>
                        </a>
                    </div>
                </div>

                <p id="expires-at" class="text-xs text-gray-400 text-center mt-6"></p>
            </div>

            <!-- Error state -->
            <div id="state-error" class="hidden flex flex-col items-center py-4">
                <div class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-red-50 mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" class="text-red-500">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                    </svg>
                </div>
                <p id="error-message" class="text-sm text-red-600 text-center mb-4"></p>
                <a href="/" class="text-sm text-blue-600 hover:text-blue-700 font-medium">Go to homepage</a>
            </div>
        </div>
    </div>

    <script>
        async function loadInvitation() {
            const path = window.location.pathname
            const code = path.split('/invite/')[1]

            if (!code) {
                showError('No invite code provided')
                return
            }

            try {
                const res = await fetch(`/api/invitations/token/${encodeURIComponent(code)}`)
                if (!res.ok) {
                    if (res.status === 404) {
                        showError('This invitation is invalid or has expired.')
                    } else {
                        showError('Failed to load invitation. Please try again.')
                    }
                    return
                }

                const data = await res.json()
                document.getElementById('tenant-name').textContent = data.tenant_name
                document.getElementById('invite-role').textContent = data.role
                document.getElementById('invite-code').textContent = data.short_code

                if (data.message) {
                    const msgEl = document.getElementById('invite-message')
                    msgEl.textContent = `"${data.message}"`
                    msgEl.classList.remove('hidden')
                }

                const expires = new Date(data.expires_at)
                document.getElementById('expires-at').textContent = `Expires ${expires.toLocaleDateString()}`

                document.getElementById('state-loading').classList.add('hidden')
                document.getElementById('state-invite').classList.remove('hidden')
            } catch {
                showError('Could not connect to server. Please try again.')
            }
        }

        function showError(message) {
            document.getElementById('state-loading').classList.add('hidden')
            document.getElementById('error-message').textContent = message
            document.getElementById('state-error').classList.remove('hidden')
        }

        function copyCode() {
            const code = document.getElementById('invite-code').textContent
            navigator.clipboard.writeText(code)
        }

        loadInvitation()
    </script>

</body>
</html>
