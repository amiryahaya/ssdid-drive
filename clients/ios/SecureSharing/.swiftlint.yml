# SwiftLint Configuration for SecureSharing iOS

# Paths to include during linting
included:
  - SecureSharing
  - SecureSharingTests
  - ShareExtension
  - FileProviderExtension

# Paths to exclude from linting
excluded:
  - .build
  - Pods
  - Carthage
  - DerivedData
  - Frameworks
  - "*/Generated"
  - "**/*.generated.swift"

# Disabled rules
disabled_rules:
  - trailing_whitespace
  - line_length
  - type_body_length
  - file_length
  - function_body_length
  - cyclomatic_complexity
  - todo
  - empty_count
  - for_where
  - implicit_optional_initialization

# Enabled opt-in rules
opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - yoda_condition

# Rule configurations
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - iv
    - pk
    - sk
    - ok
    - to
    - db
    - ip
    - x
    - y
    - z
    - i
    - j
    - k

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 3
    error: 5
  function_level:
    warning: 5
    error: 10

large_tuple:
  warning: 4
  error: 5

force_cast:
  severity: warning

force_try:
  severity: warning

force_unwrapping:
  severity: warning

# Custom rules
custom_rules:
  no_print_statements:
    name: "No Print Statements"
    regex: "\\bprint\\s*\\("
    message: "Use proper logging instead of print statements in production code"
    severity: warning
    match_kinds:
      - identifier

  no_hardcoded_credentials:
    name: "No Hardcoded Credentials"
    regex: "(password|secret|apikey|api_key)\\s*[:=]\\s*[\"'][^\"']+[\"']"
    message: "Do not hardcode credentials - use secure storage or environment variables"
    severity: error
    match_kinds:
      - string

# Reporter type (github-actions-logging for CI)
reporter: "xcode"
