name: SecureSharing
options:
  bundleIdPrefix: com.securesharing
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

targets:
  SecureSharing:
    type: application
    platform: iOS
    sources:
      - path: SecureSharing
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: SecureSharing/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.securesharing.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_BITCODE: NO
    entitlements:
      path: SecureSharing/SecureSharing.entitlements
      properties:
        com.apple.developer.associated-domains: []
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.securesharing.app
    preBuildScripts: []
    postBuildScripts: []

schemes:
  SecureSharing:
    build:
      targets:
        SecureSharing: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
