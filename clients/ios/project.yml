name: SsdidDrive
options:
  bundleIdPrefix: my.ssdid.drive
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

packages:
  Argon2Swift:
    path: SsdidDrive/Packages/Argon2Swift

targets:
  SsdidDrive:
    type: application
    platform: iOS
    sources:
      - path: SsdidDrive/SsdidDrive
        excludes:
          - "**/.DS_Store"
          - "**/Info.plist"
      - path: SsdidDrive/Shared
        excludes:
          - "**/.DS_Store"
      - path: SsdidDrive/Assets.xcassets
      - path: SsdidDrive/LaunchScreen.storyboard
    dependencies:
      - framework: SsdidDrive/Frameworks/KazKemNative.xcframework
        embed: true
      - framework: SsdidDrive/Frameworks/KazSignNative.xcframework
        embed: false
      - package: Argon2Swift
    settings:
      base:
        INFOPLIST_FILE: SsdidDrive/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        ENABLE_BITCODE: NO
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/SsdidDrive/Native/MlDsaNative/include $(SRCROOT)/SsdidDrive/Native/MlKemNative/include"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/SsdidDrive/Native/MlDsaNative/include $(SRCROOT)/SsdidDrive/Native/MlKemNative/include"
    entitlements:
      path: SsdidDrive/SsdidDrive.entitlements
      properties:
        com.apple.developer.associated-domains: []
        keychain-access-groups:
          - $(AppIdentifierPrefix)my.ssdid.drive.app
    preBuildScripts: []
    postBuildScripts: []

schemes:
  SsdidDrive:
    build:
      targets:
        SsdidDrive: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
