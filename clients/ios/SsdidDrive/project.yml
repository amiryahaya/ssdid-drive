name: SsdidDrive
options:
  bundleIdPrefix: my.ssdid.drive
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  OneSignal:
    url: https://github.com/OneSignal/OneSignal-iOS-SDK
    from: "5.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"

localPackages:
  - Packages/Argon2Swift

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SsdidDrive:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: SsdidDrive
        excludes:
          - "**/*.md"
          - ".build/**"
      - path: Shared
      - path: Assets.xcassets
      - path: LaunchScreen.storyboard
      - path: PrivacyInfo.xcprivacy
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDrive
        CODE_SIGN_ENTITLEMENTS: SsdidDrive.entitlements
        SUPPORTS_MACCATALYST: YES
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: NO
      platform:
        macOS:
          CODE_SIGN_ENTITLEMENTS: SsdidDrive.macos.entitlements
    dependencies:
      - framework: Frameworks/KazKemNative.xcframework
        embed: false
      - framework: Frameworks/KazSignNative.xcframework
        embed: false
      - package: OneSignal
        product: OneSignalFramework
      - package: OneSignal
        product: OneSignalExtension
      - package: Sentry
        product: Sentry
      - package: Argon2Swift
        product: Argon2Swift
      - target: ShareExtension
        platformFilter: iOS
      - target: FileProviderExtension
        platformFilter: iOS
      - target: MenuBarHelper
        platformFilter: macOS
        embed: false
    postCompileScripts:
      - script: |
          # Copy MenuBarHelper into Contents/Library/LoginItems/ for Catalyst builds.
          # MenuBarHelper is a native macOS target so it builds into the non-catalyst products dir.
          if [ "${IS_MACCATALYST}" = "YES" ]; then
            HELPER_SRC="${BUILD_DIR}/${CONFIGURATION}/MenuBarHelper.app"
            LOGIN_ITEMS_DIR="${BUILT_PRODUCTS_DIR}/${FULL_PRODUCT_NAME}/Contents/Library/LoginItems"
            if [ -d "${HELPER_SRC}" ]; then
              mkdir -p "${LOGIN_ITEMS_DIR}"
              cp -R "${HELPER_SRC}" "${LOGIN_ITEMS_DIR}/"
            fi
          fi
        name: Copy MenuBarHelper to LoginItems

  MenuBarHelper:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "13.0"
    sources:
      - path: MenuBarHelper
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: MenuBarHelper/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDrive.MenuBarHelper
        CODE_SIGN_ENTITLEMENTS: MenuBarHelper.entitlements
        SKIP_INSTALL: YES

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: ShareExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDrive.ShareExtension
        CODE_SIGN_ENTITLEMENTS: ShareExtension.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        SKIP_INSTALL: YES

  FileProviderExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: FileProviderExtension
      - path: FileProviderCore
      - path: Shared
      - path: SsdidDrive/Crypto/PQC/KAZKEM.swift
    dependencies:
      - framework: Frameworks/KazKemNative.xcframework
        embed: false
      - framework: Frameworks/KazSignNative.xcframework
        embed: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: FileProviderExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDrive.FileProvider
        CODE_SIGN_ENTITLEMENTS: FileProviderExtension.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        SKIP_INSTALL: YES

  SsdidDriveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SsdidDriveTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDriveTests
    dependencies:
      - target: SsdidDrive

  SsdidDriveUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SsdidDriveUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: my.ssdid.drive.SsdidDriveUITests
        TEST_HOST: ""
    dependencies:
      - target: SsdidDrive
