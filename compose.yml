services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ssdid_drive
      POSTGRES_PASSWORD: ssdid_drive
      POSTGRES_DB: ssdid_drive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssdid_drive"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/amiryahaya/ssdid-drive/api:latest
    ports:
      - "8080:8080"
    volumes:
      - api-logs:/app/logs
      - api-data:/app/data
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=ssdid_drive;Username=ssdid_drive;Password=ssdid_drive"
      ConnectionStrings__Redis: "redis:6379"
      ASPNETCORE_ENVIRONMENT: Production
      ENABLE_AUTO_MIGRATE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  api-logs:
  api-data:
