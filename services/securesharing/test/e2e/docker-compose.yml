# Playwright E2E Test Runner
#
# Usage:
#   1. Start Phoenix server locally: MIX_ENV=dev mix phx.server
#   2. Run tests: docker-compose up --build
#
# For CI, ensure the app is running before executing tests.

services:
  playwright:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: e2e_playwright
    environment:
      CI: "true"
      BASE_URL: http://host.docker.internal:4000
      E2E_ADMIN_EMAIL: admin@securesharing.test
      E2E_ADMIN_PASSWORD: AdminTestPassword123!
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
