# Garage configuration for E2E testing
# This is a minimal single-node setup for testing purposes

metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

[rpc]
bind_addr = "[::]:3901"
secret = "e2e-test-rpc-secret-key-1234567890abcdef"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".web.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "e2e-admin-token"

# Bootstrap node configuration
# In single-node setup, this node is both bootstrap and storage
