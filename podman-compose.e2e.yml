# SecureSharing E2E Testing Stack with Podman
#
# Comprehensive testing environment using Podman instead of Docker.
# PostgreSQL 18, Garage (S3-compatible), Backend, PII Service, Playwright.
#
# Usage:
#   # Start all services
#   podman-compose -f podman-compose.e2e.yml up -d
#
#   # Run E2E tests
#   podman-compose -f podman-compose.e2e.yml run --rm playwright npx playwright test
#
#   # Stop and clean up
#   podman-compose -f podman-compose.e2e.yml down -v

services:
  # ============================================================================
  # PostgreSQL 18 Database
  # ============================================================================
  postgres:
    image: docker.io/postgres:18-alpine
    container_name: e2e_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_e2e_data:/var/lib/postgresql/data
      - ./scripts/docker/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - e2e_network
    ports:
      - "5433:5432"  # Expose on different port to avoid conflicts

  # ============================================================================
  # Garage - S3-compatible Object Storage
  # ============================================================================
  garage:
    image: docker.io/dxflrs/garage:v1.0.1
    container_name: e2e_garage
    command: server
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
    volumes:
      - garage_e2e_data:/var/lib/garage/data
      - garage_e2e_meta:/var/lib/garage/meta
      - ./services/securesharing/test/e2e/fixtures/garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3900/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - e2e_network

  # ============================================================================
  # SecureSharing Backend
  # ============================================================================
  backend:
    build:
      context: ./services/securesharing
      dockerfile: test/e2e/Dockerfile.app
    container_name: e2e_backend
    environment:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/securesharing_test
      SECRET_KEY_BASE: e2e-test-secret-key-base-that-is-at-least-64-characters-long-for-security
      PHX_HOST: localhost
      PORT: "4000"
      # Storage configuration
      S3_BUCKET: securesharing-test
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY_ID: GK31c2f218a2e44f485b94239e
      S3_SECRET_ACCESS_KEY: b892c0665f0ada8a4755dae98baa3b133590e11dae3bcc1f9d769d67f16c3835
      S3_REGION: garage
      # PII Service
      PII_SERVICE_URL: http://pii-service:4001
      # Test admin user
      E2E_ADMIN_EMAIL: admin@securesharing.test
      E2E_ADMIN_PASSWORD: AdminTestPassword123!
      # Disable rate limiting for tests
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - e2e_network
    ports:
      - "4000:4000"

  # ============================================================================
  # PII Service
  # ============================================================================
  pii-service:
    build:
      context: ./services/pii_service
      dockerfile: Dockerfile
    container_name: e2e_pii_service
    environment:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pii_service_test
      SECRET_KEY_BASE: pii-service-test-secret-key-base-that-is-at-least-64-characters-long
      PHX_HOST: localhost
      PORT: "4001"
      # Use mock LLM provider for tests
      LLM_PROVIDER: mock
      # Disable rate limiting for tests
      RATE_LIMIT_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4001/health"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - e2e_network
    ports:
      - "4001:4001"

  # ============================================================================
  # Database Setup - Backend Migrations
  # ============================================================================
  db-setup:
    build:
      context: ./services/securesharing
      dockerfile: test/e2e/Dockerfile.app
    container_name: e2e_db_setup
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running backend migrations...' &&
        mix ecto.create &&
        mix ecto.migrate &&
        echo 'Seeding E2E test data...' &&
        mix run priv/repo/seeds/e2e_seed.exs 2>/dev/null || echo 'Seed may already exist' &&
        echo 'Backend database setup complete!'
      "
    environment:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/securesharing_test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - e2e_network

  # ============================================================================
  # Database Setup - PII Service Migrations
  # ============================================================================
  pii-db-setup:
    build:
      context: ./services/pii_service
      dockerfile: Dockerfile
    container_name: e2e_pii_db_setup
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running PII service migrations...' &&
        mix ecto.create &&
        mix ecto.migrate &&
        echo 'Seeding PII E2E test data...' &&
        mix run priv/repo/seeds/e2e_pii_seed.exs 2>/dev/null || echo 'Seed may already exist' &&
        echo 'PII service database setup complete!'
      "
    environment:
      MIX_ENV: test
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pii_service_test
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - e2e_network

  # ============================================================================
  # Playwright Test Runner
  # ============================================================================
  playwright:
    build:
      context: ./services/securesharing/test/e2e
      dockerfile: Dockerfile
    container_name: e2e_playwright
    environment:
      CI: "true"
      BASE_URL: http://backend:4000
      BACKEND_URL: http://backend:4000
      PII_SERVICE_URL: http://pii-service:4001
      E2E_ADMIN_EMAIL: admin@securesharing.test
      E2E_ADMIN_PASSWORD: AdminTestPassword123!
      E2E_TENANT_SLUG: e2e-test
      # Enable all test features
      ENABLE_FILE_UPLOAD_TESTS: "1"
      ENABLE_PII_SERVICE_TESTS: "1"
    depends_on:
      backend:
        condition: service_healthy
      pii-service:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      pii-db-setup:
        condition: service_completed_successfully
    volumes:
      - ./services/securesharing/test/e2e/playwright-report:/app/playwright-report
      - ./services/securesharing/test/e2e/test-results:/app/test-results
    networks:
      - e2e_network
    command: npx playwright test --reporter=html,json

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_e2e_data:
  garage_e2e_data:
  garage_e2e_meta:

# ============================================================================
# Networks
# ============================================================================
networks:
  e2e_network:
    driver: bridge
